<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow | Modern Payroll Automation</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "background-dark": "#0f172a",
                        "card-dark": "#1e293b",
                        "indigo-dark": "#1e293b",
                        "trust-blue": "#2563EB",
                        "success-green": "#10B981",
                        "surface-deep": "#0f172a",
                        "surface-accent": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            scrollbar-width: thin;
            scrollbar-color: #334155 #f1f5f9;
            overflow-x: hidden;
        }
        .dark body {
            scrollbar-color: #334155 #0f172a;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .dark ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563EB;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "zustand": "https://esm.sh/zustand@^5.0.3",
    "zustand/": "https://esm.sh/zustand@^5.0.3/",
    "react-hook-form": "https://esm.sh/react-hook-form@^7.54.2",
    "zod": "https://esm.sh/zod@^3.24.1",
    "@hookform/resolvers/zod": "https://esm.sh/@hookform/resolvers@^3.10.0/zod",
    "@hookform/resolvers/": "https://esm.sh/@hookform/resolvers@^5.2.2/"
  }
}
</script>
</head>
<body class="bg-slate-50 dark:bg-background-dark text-slate-900 dark:text-slate-200 min-h-screen transition-colors duration-300">
    <div id="root"></div>
</body>
</html>
